slam_toolbox:
  ros__parameters:

    # ======================
    # 🔧 Solver
    # ======================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_region_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ======================
    # 🧭 Frames
    # ======================
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    # ======================
    # ⏱️ Timing (متظبط)
    # ======================
    transform_timeout: 0.3          # كان عالي → بيعمل lag
    tf_buffer_duration: 30.0        # مهم للـ TF stability
    minimum_time_interval: 0.4      # يمنع overload

    map_update_interval: 1.0

    # ======================
    # 🚶 Motion thresholds
    # ======================
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1

    # ======================
    # 📡 Laser settings (🔥 FIX مهم)
    # ======================
    min_laser_range: 0.2            # كان غلط باسم minimum_*
    max_laser_range: 8.0           # كان غلط باسم maximum_*

    # ======================
    # ⚙️ Scan handling (🔥 أهم جزء)
    # ======================
    throttle_scans: 1              # بدل 5 (5 كان بيبطّأ زيادة)
    scan_queue_size: 50             # بدل buffer misuse
    scan_buffer_size: 30            # كان 200 تقيل جداً
    scan_buffer_maximum_scan_distance: 10.0

    # ======================
    # 🧠 Matching
    # ======================
    use_scan_matching: true
    use_scan_barycenter: false      # كان مكرر مرتين

    # ======================
    # 🗺️ Loop closure
    # ======================
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # ======================
    # 🧾 General
    # ======================
    resolution: 0.05

    debug_logging: false