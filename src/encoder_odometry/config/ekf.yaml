ekf_filter_node:
  ros__parameters:

    # =========================
    # GENERAL
    # =========================
    frequency: 10.0
    sensor_timeout: 2.0

    two_d_mode: true

    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    use_sim_time: false

    # =========================
    # TIMING
    # =========================
    transform_time_offset: 0.0
    transform_timeout: 1.0

    # =========================
    # DEBUG
    # =========================
    print_diagnostics: true
    debug: false

    # =========================
    # ODOM INPUT (🔥 FIX هنا)
    # =========================
    odom0: /odom

    odom0_config: [
      true,  true,  false,   # x, y
      false, false, true,    # 🔥 yaw ON (مهم جدًا)
      true,  false, false,   # vx
      false, false, true,    # wz
      false, false, false
    ]

    odom0_differential: false
    odom0_relative: false

    # =========================
    # IMU INPUT
    # =========================
    imu0: /imu

    imu0_config: [
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, true,    # gyro z
      false, false, false
    ]

    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true